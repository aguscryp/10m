<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Panel | MGA CLUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff007a; --bg: #010101; --glass: rgba(255, 255, 255, 0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; background: radial-gradient(circle at top right, #1a010c, #000); min-height: 100vh; }
        nav { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 6%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 800; font-size: 1.4rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--pink); }
        
        /* MENU LATERAL */
        .burger { cursor: pointer; z-index: 1100; }
        .burger span { display: block; width: 25px; height: 2px; background: #fff; margin: 6px 0; transition: 0.4s; }
        .side-menu { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: #080808; border-left: 1px solid rgba(255,255,255,0.1); padding: 100px 30px; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1050; }
        .side-menu.active { right: 0; }
        .nav-link { display: flex; align-items: center; gap: 15px; color: #fff; text-decoration: none; padding: 15px 0; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .nav-link:hover { color: var(--pink); padding-left: 10px; }

        /* CONTENT */
        .container { max-width: 800px; margin: 60px auto; padding: 0 25px; text-align: center; }
        .welcome-box { background: var(--glass); padding: 50px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.07); backdrop-filter: blur(20px); }
        .user-name { color: var(--pink); font-weight: 800; }

        /* WHATSAPP */
        .wa-card { background: linear-gradient(135deg, #25d366 0%, #075e54 100%); padding: 25px; border-radius: 25px; margin-top: 30px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .wa-card:hover { transform: translateY(-5px); }

        /* MODAL */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:2000; }
        .modal.active { display:flex; }
        .modal-inner { background:#111; border:1px solid var(--pink); padding:40px; border-radius:30px; max-width:400px; text-align:center; }
        .btn-modal { background:#fff; color:#000; border:none; padding:15px 30px; border-radius:15px; font-weight:800; cursor:pointer; margin-top:20px; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">MGA <span>VIP</span></a>
        <div class="burger" id="burger"><span></span><span></span><span></span></div>
    </nav>

    <div class="side-menu" id="side-menu">
        <div id="links-container"></div>
        <a href="#" onclick="logout()" class="nav-link" style="color:#ff4444; margin-top:auto;"><i class="fas fa-power-off"></i> CERRAR SESIÓN</a>
    </div>

    <div class="container">
        <div class="welcome-box">
            <h1>Hola, <span class="user-name" id="user-txt">Alumno</span></h1>
            <p style="color:#666; margin-top:10px;">Bienvenido a tu panel de control empresarial.</p>
        </div>

        <div class="wa-card" onclick="openModal()">
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="fab fa-whatsapp" style="font-size:2rem;"></i>
                <div style="text-align:left;">
                    <p style="font-weight:800; margin:0;">GRUPO DE WHATSAPP</p>
                    <p style="font-size:0.7rem; opacity:0.8; margin:0;">SOLICITAR ACCESO AL GESTOR</p>
                </div>
            </div>
            <i class="fas fa-chevron-right"></i>
        </div>
    </div>

    <div class="modal" id="modal-wa">
        <div class="modal-inner">
            <i class="fas fa-clock" style="font-size:3rem; color:var(--pink); margin-bottom:15px;"></i>
            <h3>Sala de Espera</h3>
            <p style="color:#888; font-size:0.9rem; margin-top:10px;">Al unirte, un administrador revisará tu perfil. Por favor, espera a ser aceptado.</p>
            <button class="btn-modal" onclick="goToWA()">ENTRAR AL GRUPO</button>
        </div>
    </div>

    <script>
        // SEGURIDAD Y SESIÓN
        const session = JSON.parse(localStorage.getItem('mga_session'));
        if(!session) window.location.href = '../usuarios/login.html';
        document.getElementById('user-txt').innerText = session.name;

        // CARGAR MENÚ DESDE GESTIÓN
        function renderMenu() {
            const data = JSON.parse(localStorage.getItem('mga_menu_db')) || [];
            const cont = document.getElementById('links-container');
            cont.innerHTML = data.map(i => `<a href="${i.url}" class="nav-link"><i class="${i.icon}"></i> ${i.title.toUpperCase()}</a>`).join('');
        }

        // WHATSAPP DINÁMICO
        function openModal() { document.getElementById('modal-wa').classList.add('active'); }
        function goToWA() {
            const config = JSON.parse(localStorage.getItem('mga_config')) || { wa_link: '#' };
            if(config.wa_link !== '#') window.open(config.wa_link, '_blank');
            else alert("Link no configurado por el admin.");
            document.getElementById('modal-wa').classList.remove('active');
        }

        // INTERACCIONES
        const burger = document.getElementById('burger');
        const side = document.getElementById('side-menu');
        burger.onclick = () => { side.classList.toggle('active'); burger.classList.toggle('active'); };
        function logout() { localStorage.removeItem('mga_session'); window.location.href = '../usuarios/login.html'; }

        renderMenu();
    </script>
</body>
</html>
