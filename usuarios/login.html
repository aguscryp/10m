<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Elite | CLUB MGA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-pink: #ff007a; --bg-dark: #000000; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.07); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; overflow: hidden; height: 100vh; background: radial-gradient(circle at bottom left, #1a010c, #000); }
        #money-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; pointer-events: none; }
        nav { height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 6%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(25px); border-bottom: 1px solid var(--glass-border); position: fixed; top: 0; width: 100%; z-index: 1000; }
        .logo { font-weight: 800; font-size: 1.4rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--neon-pink); }
        .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--glass); padding: 50px 40px; border-radius: 40px; border: 1px solid var(--glass-border); backdrop-filter: blur(30px); width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; }
        input { width: 100%; padding: 18px 25px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; font-size: 1rem; outline: none; margin-bottom: 20px; transition: 0.3s; }
        input:focus { border-color: var(--neon-pink); background: rgba(255,255,255,0.08); }
        .login-btn { width: 100%; padding: 20px; border-radius: 20px; border: none; background: #fff; color: #000; font-weight: 800; cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        .login-btn:hover { background: var(--neon-pink); color: #fff; transform: translateY(-3px); }
    </style>
</head>
<body>
    <canvas id="money-canvas"></canvas>
    <nav><a href="../index.html" class="logo">CLUB <span>MGA</span></a></nav>
    <div class="login-container">
        <div class="login-card">
            <i class="fas fa-user-lock" style="font-size: 3rem; color: var(--neon-pink); margin-bottom: 20px;"></i>
            <h2>Acceso Alumnos</h2>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="login-btn" onclick="handleLogin()">Entrar al VIP</button>
        </div>
    </div>

    <script>
        // DINERO CAYENDO
        const canvas = document.getElementById('money-canvas');
        const ctx = canvas.getContext('2d');
        let p = [];
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; p = []; for (let i = 0; i < 40; i++) p.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2 + 1, o: Math.random() * 0.4 + 0.1 }); }
        function draw() { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "rgba(255, 255, 255, 0.3)"; ctx.font = "20px serif"; p.forEach(i => { ctx.globalAlpha = i.o; ctx.fillText('$', i.x, i.y); i.y += i.s; if (i.y > canvas.height) i.y = -20; }); requestAnimationFrame(draw); }
        init(); draw(); window.onresize = init;

        // LOGIN DINÁMICO
        function handleLogin() {
            const uInput = document.getElementById('user').value;
            const pInput = document.getElementById('pass').value;
            const btn = document.querySelector('.login-btn');

            // Cargar usuarios de la "DB" (LocalStorage)
            const usersDB = JSON.parse(localStorage.getItem('mga_users_db')) || [{name:'Admin', user:'admin', pass:'mgapanel'}];

            const found = usersDB.find(u => u.user === uInput && u.pass === pInput);

            btn.innerText = "VERIFICANDO...";
            setTimeout(() => {
                if (found) {
                    localStorage.setItem('mga_session', JSON.stringify({ name: found.name, logged: true }));
                    window.location.href = '../privado/vip.html';
                } else {
                    alert("❌ Acceso denegado. Verifica tus credenciales.");
                    btn.innerText = "Entrar al VIP";
                }
            }, 800);
        }
    </script>
</body>
</html>
