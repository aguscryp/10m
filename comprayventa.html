    <style>
        :root {
            --neon-pink: #ff007a;
            --dark-bg: #020203;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--dark-bg); 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Título de Alto Impacto */
        h1 {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 800;
            text-align: center;
            max-width: 900px;
            margin-bottom: 40px;
            line-height: 1.1;
            background: linear-gradient(to right, #fff, var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* Contenedor del Video VSL */
        .video-container {
            width: 100%;
            max-width: 850px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 0, 122, 0.15);
            margin-bottom: 50px;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Botón de WhatsApp Ultra Llamativo */
        .btn-whatsapp {
            background: #25d366;
            color: #fff;
            text-decoration: none;
            padding: 22px 50px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 15px 35px rgba(37, 211, 102, 0.4);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse-green 2s infinite;
        }

        .btn-whatsapp:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 50px rgba(37, 211, 102, 0.6);
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .sub-text {
            margin-top: 20px;
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .btn-whatsapp { width: 100%; justify-content: center; font-size: 1.1rem; }
