<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SIK | Control Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --neon-blue: #3b82f6;
            --neon-red: #ef4444;
            --bg-main: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main); 
            color: #0f172a; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }

        /* Estructura Neon Flow */
        .card-neo { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-neo:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }

        .sidebar-active { background: #000 !important; color: #fff !important; transform: scale(1.02); }
        
        /* Calendario de Alto Desempeño */
        .day-cell { 
            aspect-ratio: 1/1;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 16px; border: 2px solid transparent; 
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .day-today { background: #000 !important; color: #fff !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); }
        .day-selected { border-color: var(--neon-blue) !important; background: rgba(59, 130, 246, 0.08); }

        /* Botones con Efecto Presionado */
        button:active { transform: scale(0.96); }

        /* Inputs Premium */
        input { transition: all 0.2s; border: 2px solid transparent !important; }
        input:focus { border-color: #000 !important; background: white !important; box-shadow: 0 0 0 4px rgba(0,0,0,0.05); }

        /* Animaciones de Vista */
        .view { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbars Invisibles pero Funcionales */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Bottom Bar Blur */
        .mobile-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Dialogs Estilo iOS/Moderno */
        dialog { 
            width: 95%; max-width: 440px; 
            border-radius: 32px; 
            padding: 24px; 
            border: none;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        dialog::backdrop { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row">

    <aside class="hidden lg:flex w-72 h-screen border-r border-slate-200 p-8 flex-col justify-between sticky top-0 bg-white">
        <div class="space-y-12">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black rounded-xl flex items-center justify-center">
                    <div class="w-5 h-5 border-2 border-white rounded-full"></div>
                </div>
                <h1 class="text-3xl font-extrabold italic tracking-tighter uppercase">SIK</h1>
            </div>
            
            <nav class="space-y-3">
                <button onclick="nav('dash')" id="btn-dash" class="sidebar-active w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-[11px] font-bold uppercase tracking-wider"><i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard</button>
                <button onclick="nav('clients')" id="btn-clients" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:bg-slate-50"><i data-lucide="users" class="w-5 h-5"></i> Clientes</button>
                <button onclick="nav('leads')" id="btn-leads" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:bg-slate-50"><i data-lucide="contact" class="w-5 h-5"></i> Contactos</button>
                <button onclick="nav('deudas')" id="btn-deudas" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:bg-slate-50"><i data-lucide="wallet" class="w-5 h-5"></i> Deudas</button>
                <button onclick="nav('tasks')" id="btn-tasks" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl text-[11px] font-bold uppercase tracking-wider text-slate-400 hover:bg-slate-50"><i data-lucide="command" class="w-5 h-5"></i> Operaciones</button>
            </nav>
        </div>
        
        <div class="p-5 bg-slate-950 rounded-[2rem] text-white flex items-center gap-4 shadow-xl">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-emerald-400 flex items-center justify-center font-bold">A</div>
            <div>
                <p class="text-[9px] font-bold uppercase text-slate-500">Administrador</p>
                <p class="text-[12px] font-bold">Agustín S.</p>
            </div>
        </div>
    </aside>

    <div class="mobile-nav lg:hidden fixed bottom-0 left-0 right-0 border-t border-slate-100 flex justify-around p-4 z-50">
        <button onclick="nav('dash')" class="p-3 rounded-2xl" id="m-dash"><i data-lucide="layout-grid"></i></button>
        <button onclick="nav('clients')" class="p-3 rounded-2xl" id="m-clients"><i data-lucide="users"></i></button>
        <button onclick="nav('leads')" class="p-3 rounded-2xl" id="m-leads"><i data-lucide="contact"></i></button>
        <button onclick="nav('deudas')" class="p-3 rounded-2xl" id="m-deudas"><i data-lucide="wallet"></i></button>
        <button onclick="nav('tasks')" class="p-3 rounded-2xl" id="m-tasks"><i data-lucide="command"></i></button>
    </div>

    <main class="flex-1 p-6 lg:p-12 pb-24 lg:pb-12 max-w-[1600px] mx-auto w-full overflow-x-hidden">
        
        <div id="view-dash" class="view space-y-10">
            <header class="flex flex-col md:flex-row justify-between items-start gap-6">
                <div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        <p id="real-date" class="text-slate-400 text-[11px] font-bold uppercase tracking-[0.2em]"></p>
                    </div>
                    <h2 class="text-5xl lg:text-6xl font-extrabold tracking-tighter italic uppercase leading-none">Control<br class="lg:hidden"> Central</h2>
                </div>
                <div class="flex gap-4 w-full md:w-auto">
                    <div class="flex-1 md:w-48 card-neo p-5 bg-white/50 border-none">
                        <p class="text-[10px] font-bold text-red-500 uppercase mb-1">Deuda Total</p>
                        <p id="dash-debt" class="text-3xl font-black text-slate-900 tracking-tighter">$0</p>
                    </div>
                    <div class="flex-1 md:w-48 card-neo p-5 bg-black text-white border-none">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">A Cobrar</p>
                        <p id="dash-cash" class="text-3xl font-black tracking-tighter text-emerald-400">$0</p>
                    </div>
                </div>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">
                <div class="xl:col-span-5 space-y-6">
                    <div class="flex justify-between items-end">
                        <h3 class="text-[11px] font-black uppercase tracking-widest text-slate-400">Foco del Día: <span id="selected-label" class="text-black ml-2">...</span></h3>
                    </div>
                    <div id="tasks-today" class="space-y-4"></div>
                    <div class="relative group">
                        <i data-lucide="plus" class="absolute left-5 top-5 w-5 h-5 text-slate-300 group-focus-within:text-black transition-colors"></i>
                        <input type="text" id="quickTaskInput" placeholder="Nueva tarea para este día..." 
                               class="w-full bg-white border-slate-200 p-5 pl-14 rounded-[2rem] outline-none font-semibold text-[14px] shadow-sm text-natural"
                               onkeydown="if(event.key==='Enter') app.addQuickTask(this.value)">
                    </div>
                </div>

                <div class="xl:col-span-7 card-neo p-8 bg-white">
                    <div class="flex justify-between items-center mb-10 px-2">
                        <h4 id="calendar-month-label" class="text-[12px] font-black uppercase tracking-[0.3em] text-slate-900"></h4>
                        <div class="flex gap-3">
                            <button onclick="app.changeMonth(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-xl transition-all"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                            <button onclick="app.changeMonth(1)" class="w-10 h-10 flex items-center justify-center hover:bg-slate-100 rounded-xl transition-all"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
                </div>
            </div>
        </div>

        <section id="view-clients" class="view hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-5xl font-black tracking-tighter italic uppercase">Clientes</h2>
                <button onclick="app.openModal('modalC')" class="bg-black text-white px-8 py-4 rounded-full text-[11px] font-bold uppercase tracking-widest hover:bg-slate-800 transition-all shadow-lg">Nueva Venta</button>
            </div>
            <div id="clients-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="view-deudas" class="view hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-5xl font-black tracking-tighter italic uppercase text-red-600">Deudas</h2>
                <button onclick="app.openModal('modalD')" class="bg-red-600 text-white px-8 py-4 rounded-full text-[11px] font-bold uppercase tracking-widest hover:bg-red-700 transition-all shadow-lg shadow-red-100">Registrar</button>
            </div>
            <div id="deudas-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="view-leads" class="view hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-5xl font-black tracking-tighter italic uppercase">Contactos</h2>
                <button onclick="app.openModal('modalL')" class="bg-black text-white px-8 py-4 rounded-full text-[11px] font-bold uppercase tracking-widest shadow-lg">Nuevo Lead</button>
            </div>
            <div id="leads-list" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </section>

        <section id="view-tasks" class="view hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-5xl font-black tracking-tighter italic uppercase">Operaciones</h2>
                <button onclick="app.openModal('modalTask')" class="bg-black text-white px-8 py-4 rounded-full text-[11px] font-bold uppercase tracking-widest shadow-lg">Agendar Tarea</button>
            </div>
            <div id="full-tasks-list" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
        </section>

    </main>

    <dialog id="modalAbonar">
        <div class="text-center space-y-6">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-2">
                <i data-lucide="landmark" class="w-8 h-8"></i>
            </div>
            <div>
                <h3 class="text-2xl font-black uppercase italic leading-none" id="abonar-titulo">Monto</h3>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Saldo pendiente: <span id="abonar-pendiente" class="text-red-500"></span></p>
            </div>
            <input type="number" id="inputMontoAbono" placeholder="0.00" class="w-full bg-slate-50 p-6 rounded-[2rem] font-black text-3xl text-center outline-none border-none">
            <div class="flex gap-3">
                <button onclick="app.closeModal('modalAbonar')" class="flex-1 bg-slate-100 py-5 rounded-2xl text-[11px] font-bold uppercase">Cerrar</button>
                <button onclick="app.confirmarAbono()" class="flex-1 bg-black text-white py-5 rounded-2xl text-[11px] font-bold uppercase tracking-widest">Confirmar</button>
            </div>
        </div>
    </dialog>

    <dialog id="modalC">
        <h3 class="text-2xl font-black uppercase italic mb-8">Registrar Cliente</h3>
        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[9px] font-bold uppercase ml-2 text-slate-400">Datos Personales</label>
                <input type="text" id="cName" placeholder="Nombre completo" class="w-full bg-slate-100 p-4 rounded-2xl font-bold text-natural">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="cProduct" placeholder="Servicio" class="bg-slate-100 p-4 rounded-2xl font-bold text-natural">
                <input type="text" id="cWhatsapp" placeholder="WhatsApp" class="bg-slate-100 p-4 rounded-2xl font-bold">
            </div>
            <div class="grid grid-cols-3 gap-3">
                <div class="space-y-1">
                    <label class="text-[9px] font-bold uppercase ml-2 text-slate-400">Monto</label>
                    <input type="number" id="cAmount" class="w-full bg-slate-100 p-4 rounded-2xl font-bold">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold uppercase ml-2 text-slate-400">Meses</label>
                    <input type="number" id="cCuotas" class="w-full bg-slate-100 p-4 rounded-2xl font-bold">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-bold uppercase ml-2 text-slate-400">Día</label>
                    <input type="number" id="cDay" class="w-full bg-slate-100 p-4 rounded-2xl font-bold" min="1" max="31">
                </div>
            </div>
            <div class="flex gap-2 pt-4">
                <button onclick="app.closeModal('modalC')" class="flex-1 bg-slate-100 py-5 rounded-2xl text-[11px] font-bold">CANCELAR</button>
                <button onclick="app.addClient()" class="flex-1 bg-black text-white py-5 rounded-2xl text-[11px] font-bold">GUARDAR CLIENTE</button>
            </div>
        </div>
    </dialog>

    <dialog id="modalD">
        <h3 class="text-2xl font-black uppercase italic mb-6">Nueva Deuda</h3>
        <input type="text" id="dName" placeholder="Concepto" class="w-full bg-slate-100 p-5 rounded-2xl font-bold mb-3">
        <input type="number" id="dAmount" placeholder="Monto Total $" class="w-full bg-slate-100 p-5 rounded-2xl font-bold mb-6">
        <div class="flex gap-2">
            <button onclick="app.closeModal('modalD')" class="flex-1 bg-slate-100 py-5 rounded-2xl font-bold">CERRAR</button>
            <button onclick="app.addDeuda()" class="flex-1 bg-black text-white py-5 rounded-2xl font-bold">REGISTRAR</button>
        </div>
    </dialog>

    <dialog id="modalL">
        <h3 class="text-2xl font-black uppercase italic mb-6">Nuevo Contacto</h3>
        <input type="text" id="lName" placeholder="Nombre" class="w-full bg-slate-100 p-5 rounded-2xl font-bold mb-3">
        <input type="text" id="lPhone" placeholder="Celular" class="w-full bg-slate-100 p-5 rounded-2xl font-bold mb-6">
        <div class="flex gap-2">
            <button onclick="app.closeModal('modalL')" class="flex-1 bg-slate-100 py-5 rounded-2xl font-bold">VOLVER</button>
            <button onclick="app.addLead()" class="flex-1 bg-black text-white py-5 rounded-2xl font-bold">GUARDAR</button>
        </div>
    </dialog>

    <dialog id="modalTask">
        <h3 class="text-2xl font-black uppercase italic mb-6">Agendar Operación</h3>
        <input type="text" id="tText" placeholder="Descripción de la tarea" class="w-full bg-slate-100 p-5 rounded-2xl font-bold mb-3">
        <input type="date" id="tDate" class="w-full bg-slate-100 p-5 rounded-2xl font-bold mb-6">
        <div class="flex gap-2">
            <button onclick="app.closeModal('modalTask')" class="flex-1 bg-slate-100 py-5 rounded-2xl font-bold">CERRAR</button>
            <button onclick="app.addFullTask()" class="flex-1 bg-black text-white py-5 rounded-2xl font-bold">AGENDAR</button>
        </div>
    </dialog>

    <script>
        const app = {
            currentMonth: new Date().getMonth(),
            currentYear: new Date().getFullYear(),
            selectedDate: new Date().toISOString().split('T')[0],
            deudaTemp: null,
            db: {
                tareas: JSON.parse(localStorage.getItem('sik_t')) || [],
                clientes: JSON.parse(localStorage.getItem('sik_c')) || [],
                deudas: JSON.parse(localStorage.getItem('sik_d')) || [],
                leads: JSON.parse(localStorage.getItem('sik_l')) || []
            },

            init: function() {
                document.getElementById('real-date').innerText = new Intl.DateTimeFormat('es-AR', { weekday: 'long', day: 'numeric', month: 'long' }).format(new Date());
                this.render();
            },

            save: function() {
                localStorage.setItem('sik_t', JSON.stringify(this.db.tareas));
                localStorage.setItem('sik_c', JSON.stringify(this.db.clientes));
                localStorage.setItem('sik_d', JSON.stringify(this.db.deudas));
                localStorage.setItem('sik_l', JSON.stringify(this.db.leads));
                this.render();
            },

            openModal: function(id) { 
                const m = document.getElementById(id);
                m.querySelectorAll('input').forEach(i => i.value = "");
                if(id === 'modalTask') document.getElementById('tDate').value = this.selectedDate;
                m.showModal(); 
            },
            closeModal: function(id) { document.getElementById(id).close(); },

            render: function() {
                // Cálculo de Métricas
                const totalDeuda = this.db.deudas.reduce((a, b) => a + b.monto, 0);
                const proyectado = this.db.clientes.reduce((a, b) => a + ((b.cuotasTotales - b.cuotaActual) * b.monto), 0);
                
                document.getElementById('dash-debt').innerText = '$' + totalDeuda.toLocaleString('es-AR');
                document.getElementById('dash-cash').innerText = '$' + proyectado.toLocaleString('es-AR');
                
                this.renderCalendar();
                this.renderFocus();
                this.renderDeudas();
                this.renderClientes();
                this.renderLeads();
                this.renderTasks();
                lucide.createIcons();
            },

            renderCalendar: function() {
                const grid = document.getElementById('calendar-grid');
                const dMes = new Date(this.currentYear, this.currentMonth + 1, 0).getDate();
                const pDia = new Date(this.currentYear, this.currentMonth, 1).getDay();
                const hoyStr = new Date().toISOString().split('T')[0];
                
                document.getElementById('calendar-month-label').innerText = new Intl.DateTimeFormat('es-AR', { month: 'long', year: 'numeric' }).format(new Date(this.currentYear, this.currentMonth));

                let html = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d => `<div class="text-[10px] font-black text-slate-300 text-center pb-4 uppercase tracking-widest">${d}</div>`).join('');
                for(let i=0; i<pDia; i++) html += `<div></div>`;

                for(let d=1; d<=dMes; d++) {
                    const dStr = `${this.currentYear}-${String(this.currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const tP = this.db.tareas.filter(t => t.fecha === dStr && !t.completa);
                    const cP = this.db.clientes.filter(c => c.diaCobro === d && c.cuotaActual < c.cuotasTotales);
                    
                    html += `
                    <div onclick="app.selectDay('${dStr}')" class="day-cell ${dStr === hoyStr ? 'day-today' : 'text-slate-500'} ${dStr === this.selectedDate ? 'day-selected' : ''}">
                        <span class="z-10">${d}</span>
                        <div class="flex gap-1 mt-1 z-10">
                            ${tP.length ? '<div class="dot-task !w-1.5 !h-1.5"></div>' : ''}
                            ${cP.length ? '<div class="dot-pay !w-1.5 !h-1.5"></div>' : ''}
                        </div>
                    </div>`;
                }
                grid.innerHTML = html;
            },

            renderFocus: function() {
                const day = new Date(this.selectedDate + "T12:00:00").getDate();
                const cobros = this.db.clientes.filter(c => c.diaCobro === day && c.cuotaActual < c.cuotasTotales);
                const tareas = this.db.tareas.filter(t => t.fecha === this.selectedDate && !t.completa);
                
                document.getElementById('selected-label').innerText = new Date(this.selectedDate + "T12:00:00").toLocaleDateString('es-AR', {day:'numeric', month:'long'}).toUpperCase();
                
                const htmlCobros = cobros.map(c => `
                    <div class="bg-emerald-50/50 p-5 rounded-3xl flex justify-between items-center border border-emerald-100 group">
                        <div>
                            <p class="text-[9px] font-black text-emerald-600 uppercase mb-1">Cobro Pendiente</p>
                            <p class="text-[14px] font-bold text-natural">${c.nombre}</p>
                        </div>
                        <button onclick="app.registerPayment('${c.id}')" class="w-12 h-12 bg-emerald-500 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-200">
                            <i data-lucide="check" class="w-6 h-6"></i>
                        </button>
                    </div>`).join('');

                const htmlTareas = tareas.map(t => `
                    <div class="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                        <div>
                            <p class="text-[9px] font-black text-blue-500 uppercase mb-1">Operación</p>
                            <p class="text-[14px] font-semibold text-natural">${t.texto}</p>
                        </div>
                        <button onclick="app.completeTask('${t.id}')" class="w-8 h-8 border-2 rounded-xl border-slate-200 hover:border-black transition-all flex items-center justify-center">
                            <div class="w-4 h-4 bg-black rounded-sm opacity-0 hover:opacity-10 transition-opacity"></div>
                        </button>
                    </div>`).join('');

                document.getElementById('tasks-today').innerHTML = (htmlCobros + htmlTareas) || `
                    <div class="text-center py-10 opacity-20">
                        <i data-lucide="sun" class="mx-auto w-10 h-10 mb-2"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">Nada pendiente</p>
                    </div>`;
                lucide.createIcons();
            },

            // Funciones de Negocio
            addClient: function() {
                const c = { 
                    id: Date.now().toString(), 
                    nombre: document.getElementById('cName').value, 
                    producto: document.getElementById('cProduct').value, 
                    whatsapp: document.getElementById('cWhatsapp').value.replace(/\D/g,''), 
                    monto: Number(document.getElementById('cAmount').value), 
                    cuotasTotales: Number(document.getElementById('cCuotas').value), 
                    cuotaActual: 0, 
                    diaCobro: Number(document.getElementById('cDay').value) 
                };
                if(c.nombre && c.monto) { this.db.clientes.push(c); this.closeModal('modalC'); this.save(); }
            },

            registerPayment: function(id) {
                const c = this.db.clientes.find(x=>x.id===id);
                if(c) {
                    c.cuotaActual++;
                    if(c.cuotaActual >= c.cuotasTotales) {
                        // Opcional: mover a historial
                    }
                    this.save();
                }
            },

            addQuickTask: function(t) { 
                if(t.trim()) { 
                    this.db.tareas.push({ id: Date.now().toString(), texto: t, fecha: this.selectedDate, completa: false }); 
                    document.getElementById('quickTaskInput').value=""; 
                    this.save(); 
                } 
            },

            confirmarAbono: function() {
                const m = Number(document.getElementById('inputMontoAbono').value);
                if(m > 0 && this.deudaTemp) {
                    this.deudaTemp.monto -= m;
                    if(this.deudaTemp.monto <= 0) this.db.deudas = this.db.deudas.filter(x => x.id !== this.deudaTemp.id);
                    this.closeModal('modalAbonar');
                    this.save();
                }
            },

            addDeuda: function() {
                const n = document.getElementById('dName').value;
                const m = Number(document.getElementById('dAmount').value);
                if(n && m) { this.db.deudas.push({ id: Date.now().toString(), nombre: n, monto: m }); this.closeModal('modalD'); this.save(); }
            },

            addLead: function() {
                const n = document.getElementById('lName').value;
                const p = document.getElementById('lPhone').value.replace(/\D/g,'');
                if(n) { this.db.leads.push({ id: Date.now().toString(), nombre: n, fono: p }); this.closeModal('modalL'); this.save(); }
            },

            addFullTask: function() {
                const t = document.getElementById('tText').value;
                const d = document.getElementById('tDate').value;
                if(t && d) { this.db.tareas.push({ id: Date.now().toString(), texto: t, fecha: d, completa: false }); this.closeModal('modalTask'); this.save(); }
            },

            completeTask: function(id) { 
                const t = this.db.tareas.find(x=>x.id===id); 
                if(t) { t.completa = true; this.save(); }
            },

            selectDay: function(d) { this.selectedDate = d; this.render(); },
            changeMonth: function(dir) { 
                this.currentMonth += dir; 
                if(this.currentMonth > 11){this.currentMonth=0;this.currentYear++} 
                else if(this.currentMonth<0){this.currentMonth=11;this.currentYear--} 
                this.render(); 
            },

            renderDeudas: function() {
                document.getElementById('deudas-list').innerHTML = this.db.deudas.map(d => `
                    <div class="card-neo p-8 border-l-[12px] border-red-500 flex flex-col justify-between h-full min-h-[220px]">
                        <div>
                            <h4 class="font-black text-slate-400 text-[10px] uppercase tracking-widest mb-2">Concepto de Deuda</h4>
                            <p class="text-xl font-bold mb-4 text-natural">${d.nombre}</p>
                            <p class="text-4xl font-black text-red-600 tracking-tighter">$${d.monto.toLocaleString('es-AR')}</p>
                        </div>
                        <button onclick="app.deudaTemp=app.db.deudas.find(x=>x.id==='${d.id}'); document.getElementById('abonar-titulo').innerText=app.deudaTemp.nombre; document.getElementById('abonar-pendiente').innerText='$'+app.deudaTemp.monto.toLocaleString(); document.getElementById('modalAbonar').showModal();" 
                                class="w-full bg-slate-950 text-white py-4 rounded-2xl text-[11px] font-bold uppercase tracking-widest mt-6">Abonar Saldo</button>
                    </div>`).join('');
            },

            renderClientes: function() {
                document.getElementById('clients-list').innerHTML = this.db.clientes.map(c => `
                    <div class="card-neo p-8 flex flex-col gap-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-black text-xl text-natural leading-none mb-1">${c.nombre}</h4>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${c.producto}</p>
                            </div>
                            <button onclick="if(confirm('¿Eliminar cliente?')){app.db.clientes=app.db.clientes.filter(x=>x.id!=='${c.id}');app.save();}" class="text-slate-200 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-[10px] font-black uppercase">
                                <span>Progreso de Pago</span>
                                <span>${c.cuotaActual}/${c.cuotasTotales} Meses</span>
                            </div>
                            <div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden">
                                <div class="bg-black h-full transition-all duration-700" style="width:${(c.cuotaActual/c.cuotasTotales)*100}%"></div>
                            </div>
                        </div>
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Valor Cuota</p>
                                <p class="text-3xl font-black italic">$${c.monto.toLocaleString('es-AR')}</p>
                            </div>
                            <div class="flex gap-2">
                                <a href="https://wa.me/${c.whatsapp}" target="_blank" class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center hover:bg-emerald-500 hover:text-white transition-all"><i data-lucide="message-circle" class="w-6 h-6"></i></a>
                                <button onclick="app.registerPayment('${c.id}')" class="bg-black text-white px-6 rounded-2xl text-[10px] font-bold uppercase">Cobrar</button>
                            </div>
                        </div>
                    </div>`).join('');
            },

            renderLeads: function() {
                document.getElementById('leads-list').innerHTML = this.db.leads.map(l => `
                    <div class="card-neo p-5 text-center relative group overflow-hidden">
                        <button onclick="if(confirm('¿Eliminar?')){app.db.leads=app.db.leads.filter(x=>x.id!=='${l.id}');app.save();}" class="absolute top-3 right-3 text-slate-200 hover:text-red-500 lg:opacity-0 group-hover:opacity-100 transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
                        <div class="w-14 h-14 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4 font-black text-slate-300 text-2xl">${l.nombre.charAt(0)}</div>
                        <h4 class="font-bold text-[14px] text-natural truncate mb-1">${l.nombre}</h4>
                        <p class="text-[10px] font-bold text-slate-400 mb-5">${l.fono}</p>
                        <a href="https://wa.me/${l.fono}" target="_blank" class="block w-full bg-emerald-500 text-white py-3 rounded-xl font-bold text-[10px] uppercase shadow-lg shadow-emerald-100 hover:scale-105 transition-transform">WhatsApp</a>
                    </div>`).join('');
            },

            renderTasks: function() {
                document.getElementById('full-tasks-list').innerHTML = this.db.tareas.sort((a,b) => new Date(a.fecha) - new Date(b.fecha)).map(t => `
                    <div class="card-neo p-5 flex justify-between items-center ${t.completa ? 'opacity-30 grayscale' : ''}">
                        <div class="flex items-center gap-5">
                            <button onclick="app.completeTask('${t.id}')" class="w-10 h-10 border-2 rounded-2xl ${t.completa ? 'bg-black border-black text-white' : 'border-slate-100'} flex items-center justify-center transition-all">
                                ${t.completa ? '<i data-lucide="check" class="w-6 h-6"></i>' : ''}
                            </button>
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${new Date(t.fecha + "T12:00:00").toLocaleDateString('es-AR', {day:'numeric', month:'short'})}</p>
                                <h5 class="font-bold text-[15px] text-natural">${t.texto}</h5>
                            </div>
                        </div>
                        <button onclick="if(confirm('¿Borrar tarea?')){app.db.tareas=app.db.tareas.filter(x=>x.id!=='${t.id}');app.save();}" class="text-slate-200 hover:text-red-500 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>`).join('');
            }
        };

        function nav(v) {
            document.querySelectorAll('.view').forEach(e => e.classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            
            // Desktop Nav
            document.querySelectorAll('aside nav button').forEach(b => b.classList.remove('sidebar-active', 'text-slate-400'));
            const dBtn = document.getElementById('btn-'+v);
            if(dBtn) dBtn.classList.add('sidebar-active');

            // Mobile Nav
            document.querySelectorAll('.mobile-nav button').forEach(b => {
                b.classList.remove('bg-black', 'text-white', 'shadow-xl');
                b.classList.add('text-slate-400');
            });
            const mBtn = document.getElementById('m-'+v);
            if(mBtn) {
                mBtn.classList.remove('text-slate-400');
                mBtn.classList.add('bg-black', 'text-white', 'shadow-xl');
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

        window.onload = () => app.init();
    </script>
</body>
</html>
