<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MGA OS | Panel Maestro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff007a; --bg: #050505; --card: #111; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        /* SIDEBAR ADMIN */
        .sidebar { width: 260px; background: #000; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { background: none; border: none; color: #666; padding: 15px; text-align: left; font-weight: 700; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .nav-btn.active { background: var(--pink); color: white; box-shadow: 0 0 20px rgba(255,0,122,0.3); }
        .nav-btn i { margin-right: 10px; }

        /* MAIN AREA */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        .glass-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        input, select { background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; width: 100%; margin-top: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #555; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .btn-save { background: var(--pink); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .btn-del { color: #ff4444; cursor: pointer; background: none; border: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="margin-bottom: 30px;">MGA <span style="color:var(--pink)">PRO</span></h2>
        <button class="nav-btn active" onclick="showTab('menu-tab')"><i class="fas fa-bars"></i> Menú VIP</button>
        <button class="nav-btn" onclick="showTab('users-tab')"><i class="fas fa-users"></i> Usuarios</button>
        <button class="nav-btn" onclick="showTab('config-tab')"><i class="fas fa-cog"></i> Configuración</button>
    </div>

    <div class="main-content">
        
        <div id="menu-tab" class="tab-content active">
            <h1>Gestión de Navegación</h1>
            <div class="glass-card" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div><label>Título</label><input type="text" id="m-title"></div>
                <div><label>Ruta (URL)</label><input type="text" id="m-url"></div>
                <div><label>Icono</label><select id="m-icon">
                    <option value="fas fa-rocket">Rocket</option><option value="fas fa-video">Video</option><option value="fas fa-wallet">Wallet</option>
                </select></div>
                <button class="btn-save" onclick="addMenuItem()" style="grid-column: span 3; margin-top: 10px;">Agregar al Menú</button>
            </div>
            <div id="menu-list"></div>
        </div>

        <div id="users-tab" class="tab-content">
            <h1>Base de Datos de Alumnos</h1>
            <div class="glass-card" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div><label>Nombre Alumno</label><input type="text" id="u-name"></div>
                <div><label>Usuario</label><input type="text" id="u-user"></div>
                <div><label>Contraseña</label><input type="text" id="u-pass"></div>
                <button class="btn-save" onclick="addUser()" style="grid-column: span 3; margin-top: 10px;">Registrar Alumno</button>
            </div>
            <table>
                <thead><tr><th>Nombre</th><th>User</th><th>Pass</th><th>Acción</th></tr></thead>
                <tbody id="users-list"></tbody>
            </table>
        </div>

        <div id="config-tab" class="tab-content">
            <h1>Ajustes de la Plataforma</h1>
            <div class="glass-card">
                <h3>Enlace de Comunidad WhatsApp</h3>
                <p style="color:#666; font-size: 0.8rem; margin-bottom: 15px;">Este link se abrirá cuando el alumno acepte el aviso en el panel VIP.</p>
                <input type="text" id="conf-wa" placeholder="https://chat.whatsapp.com/...">
                <button class="btn-save" onclick="saveConfig()" style="margin-top: 15px;">Actualizar Link</button>
            </div>
        </div>
    </div>

    <script>
        // DB INICIALIZACIÓN
        let menuDB = JSON.parse(localStorage.getItem('mga_menu_db')) || [];
        let usersDB = JSON.parse(localStorage.getItem('mga_users_db')) || [{name: 'Admin', user: 'admin', pass: 'mgapanel'}];
        let configDB = JSON.parse(localStorage.getItem('mga_config')) || {wa_link: '#'};

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // GESTIÓN DE USUARIOS
        function addUser() {
            const name = document.getElementById('u-name').value;
            const user = document.getElementById('u-user').value;
            const pass = document.getElementById('u-pass').value;
            if(name && user && pass) {
                usersDB.push({name, user, pass});
                saveAll();
                document.getElementById('u-name').value = ''; document.getElementById('u-user').value = ''; document.getElementById('u-pass').value = '';
            }
        }

        function deleteUser(i) { usersDB.splice(i, 1); saveAll(); }

        // GESTIÓN DE CONFIG
        function saveConfig() {
            configDB.wa_link = document.getElementById('conf-wa').value;
            saveAll();
            alert("Configuración guardada correctamente");
        }

        // GESTIÓN DE MENÚ (Simplificado para el ejemplo)
        function addMenuItem() {
            const title = document.getElementById('m-title').value;
            const url = document.getElementById('m-url').value;
            const icon = document.getElementById('m-icon').value;
            if(title) {
                menuDB.push({title, url, icon, subs: []});
                saveAll();
            }
        }

        function saveAll() {
            localStorage.setItem('mga_menu_db', JSON.stringify(menuDB));
            localStorage.setItem('mga_users_db', JSON.stringify(usersDB));
            localStorage.setItem('mga_config', JSON.stringify(configDB));
            render();
        }

        function render() {
            // Render Usuarios
            const uList = document.getElementById('users-list');
            uList.innerHTML = usersDB.map((u, i) => `
                <tr>
                    <td>${u.name}</td>
                    <td><b>${u.user}</b></td>
                    <td><code>${u.pass}</code></td>
                    <td><button class="btn-del" onclick="deleteUser(${i})"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');

            // Cargar link actual en el input de config
            document.getElementById('conf-wa').value = configDB.wa_link;
        }

        render();
    </script>
</body>
</html>
