<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGA CLUB | TikTok Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pink: #ff007a;
            --pink-glow: rgba(255, 0, 122, 0.4);
            --bg: #050505;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: #fff; line-height: 1.6; overflow-x: hidden; }

        /* NAV PRINCIPAL */
        nav {
            height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 800; font-size: 1.5rem; color: #fff; text-decoration: none; }
        .logo span { color: var(--pink); text-shadow: 0 0 10px var(--pink); }

        /* MENU PC */
        .nav-desktop { display: flex; gap: 20px; align-items: center; }
        .nav-desktop a { color: #888; text-decoration: none; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        .nav-desktop a:hover { color: var(--pink); }

        /* BOTON HAMBURGUESA */
        .menu-toggle { display: none; cursor: pointer; flex-direction: column; gap: 5px; z-index: 2000; position: relative; }
        .menu-toggle span { width: 25px; height: 2px; background: #fff; transition: 0.3s; }

        /* --- MENÚ LATERAL (SISTEMA INDEPENDIENTE) --- */
        #menu-lateral {
            position: fixed; top: 0; right: -100%; width: 260px; height: 100vh;
            background: #080808; border-left: 1px solid var(--glass-border);
            display: flex; flex-direction: column; padding: 100px 30px;
            transition: 0.4s ease-in-out; z-index: 1500; /* Arriba del overlay */
        }
        #menu-lateral.active { right: 0; }
        #menu-lateral a {
            color: #fff; text-decoration: none; font-size: 1rem; padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05); text-transform: uppercase;
        }

        /* CAPA OSCURA (OVERLAY) */
        #capa-oscura {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1400; /* Debajo del menú lateral */
        }
        #capa-oscura.active { opacity: 1; visibility: visible; }

        /* CONTENIDO */
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .main-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 30px; }
        .main-title span { color: var(--pink); }
        .video-box { background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); padding: 10px; border-radius: 20px; margin-bottom: 40px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 15px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        @media (max-width: 992px) {
            .nav-desktop { display: none; }
            .menu-toggle { display: flex; }
            .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
            .menu-toggle.active span:nth-child(2) { opacity: 0; }
            .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">MGA <span>CLUB</span></a>
        
        <div class="nav-desktop">
            <a href="#video">Video</a>
            <a href="testimonios.html">Testimonios</a>
            <a href="usuarios/login.html" style="color: var(--pink);">Acceso Alumnos</a>
        </div>

        <div class="menu-toggle" id="btn-abrir" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </nav>

    <div class="container">
        <h1 class="main-title">Como hacer <span>$3,500,000</span> mensuales con TikTok <span>sin mostrar tu cara</span></h1>
        
        <div class="video-box">
            <div class="video-wrapper">
                <iframe src="https://drive.google.com/file/d/1qasDzO7k9uFswNYXLJqqH7aeX2jNd0Cz/preview"></iframe>
            </div>
        </div>

        <div style="background: rgba(255,0,122,0.1); padding: 40px; border-radius: 30px; border: 1px solid var(--pink);">
            <h2 style="margin-bottom: 20px;">Mi historia</h2>
            <p>Soy <b>Agus</b>, tengo 19 años y...</p>
        </div>
    </div>

    <div id="capa-oscura" onclick="toggleMenu()"></div>
    
    <div id="menu-lateral">
        <a href="#video" onclick="toggleMenu()">Video</a>
        <a href="testimonios.html" onclick="toggleMenu()">Testimonios</a>
        <a href="usuarios/login.html" onclick="toggleMenu()" style="color: var(--pink); font-weight: 800;">Acceso Alumnos</a>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('menu-lateral').classList.toggle('active');
            document.getElementById('capa-oscura').classList.toggle('active');
            document.getElementById('btn-abrir').classList.toggle('active');
        }
    </script>
</body>
</html>
