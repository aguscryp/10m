<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CMS MGA | Panel Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #ff007a; --bg: #050505; --card: #111; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px; }
        .wrapper { max-width: 1000px; margin: 0 auto; }
        
        /* Header */
        .admin-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .status-badge { background: rgba(0,255,100,0.1); color: #00ff66; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; border: 1px solid #00ff66; }

        /* Formulario Pro */
        .glass-form { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 24px; margin-bottom: 40px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .glass-form h3 { grid-column: 1 / -1; margin-bottom: 10px; font-size: 1.1rem; color: var(--pink); }
        
        input, select { background: #000; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 12px; font-size: 0.9rem; transition: 0.3s; }
        input:focus { border-color: var(--pink); box-shadow: 0 0 15px rgba(255,0,122,0.1); }

        .btn-primary { background: var(--pink); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(255,0,122,0.4); }

        /* Lista de Navegación */
        .item-row { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 18px; margin-bottom: 15px; transition: 0.3s; }
        .item-content { display: flex; align-items: center; justify-content: space-between; }
        .item-main { display: flex; align-items: center; gap: 20px; }
        .icon-preview { width: 45px; height: 45px; background: #000; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: var(--pink); font-size: 1.2rem; }
        
        .actions { display: flex; gap: 8px; }
        .btn-action { background: #222; border: none; color: white; width: 35px; height: 35px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { background: #333; color: var(--pink); }
        .btn-del { color: #ff4444; }
        .btn-del:hover { background: #441111; }

        /* Subpáginas Indentadas */
        .sub-container { margin-left: 60px; margin-top: 15px; border-left: 2px solid #222; padding-left: 20px; }
        .sub-row { background: #0c0c0c; border: 1px solid var(--border); padding: 12px 20px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; }

        .export-btn { background: #fff; color: #000; padding: 12px 25px; border-radius: 12px; font-weight: 800; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="admin-nav">
            <div>
                <h1>Gestor de Menú <span style="color:var(--pink)">VIP</span></h1>
                <span class="status-badge">SISTEMA ACTIVO</span>
            </div>
            <button onclick="exportJSON()" class="export-btn">DESCARGAR MENUGESTION.JSON</button>
        </div>

        <div class="glass-form">
            <h3>AGREGAR NUEVO MÓDULO</h3>
            <input type="text" id="title" placeholder="Nombre de la página">
            <input type="text" id="url" placeholder="Ruta (ej: modulos/video1.html)">
            <select id="icon">
                <option value="fas fa-crown">👑 VIP Gold</option>
                <option value="fas fa-rocket">🚀 Estrategia</option>
                <option value="fas fa-video">🎬 Videoclase</option>
                <option value="fas fa-chart-pie">📊 Analíticas</option>
                <option value="fas fa-wallet">💰 Ganancias</option>
                <option value="fas fa-graduation-cap">🎓 Capacitación</option>
            </select>
            <select id="parent" style="grid-column: span 2;">
                <option value="root">-- Definir como Categoría Principal --</option>
            </select>
            <button class="btn-primary" onclick="addItem()">CREAR ENLACE</button>
        </div>

        <div id="menu-list"></div>
    </div>

    <script>
        let menuDB = JSON.parse(localStorage.getItem('mga_menu_db')) || [];

        function render() {
            const list = document.getElementById('menu-list');
            const parentSelect = document.getElementById('parent');
            list.innerHTML = '';
            parentSelect.innerHTML = '<option value="root">-- Definir como Categoría Principal --</option>';

            menuDB.forEach((item, index) => {
                parentSelect.innerHTML += `<option value="${index}">Subpágina de: ${item.title}</option>`;

                let html = `
                    <div class="item-row">
                        <div class="item-content">
                            <div class="item-main">
                                <div class="icon-preview"><i class="${item.icon}"></i></div>
                                <div>
                                    <div style="font-weight: 800; text-transform: uppercase;">${item.title}</div>
                                    <div style="font-size: 0.7rem; color: #555;">DESTINO: ${item.url}</div>
                                </div>
                            </div>
                            <div class="actions">
                                <button class="btn-action" onclick="move(${index}, -1)"><i class="fas fa-chevron-up"></i></button>
                                <button class="btn-action" onclick="move(${index}, 1)"><i class="fas fa-chevron-down"></i></button>
                                <button class="btn-action btn-del" onclick="deleteItem(${index})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                `;

                if(item.subs && item.subs.length > 0) {
                    html += `<div class="sub-container">`;
                    item.subs.forEach((sub, subIdx) => {
                        html += `
                            <div class="sub-row">
                                <span><i class="${sub.icon}" style="color:var(--pink); margin-right: 10px;"></i> ${sub.title}</span>
                                <button class="btn-action btn-del" onclick="deleteSub(${index}, ${subIdx})" style="width:25px; height:25px; font-size:0.6rem;">×</button>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
                list.innerHTML += html;
            });
            localStorage.setItem('mga_menu_db', JSON.stringify(menuDB));
        }

        function addItem() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const icon = document.getElementById('icon').value;
            const parent = document.getElementById('parent').value;

            if(!title) return alert("El título es obligatorio");
            
            const newItem = { title, url, icon, subs: [] };

            if(parent === "root") menuDB.push(newItem);
            else menuDB[parent].subs.push(newItem);

            document.getElementById('title').value = '';
            document.getElementById('url').value = '';
            render();
        }

        function move(index, dir) {
            let to = index + dir;
            if(to < 0 || to >= menuDB.length) return;
            [menuDB[index], menuDB[to]] = [menuDB[to], menuDB[index]];
            render();
        }

        function deleteItem(i) { if(confirm("¿Borrar categoría?")) { menuDB.splice(i,1); render(); } }
        function deleteSub(p, s) { menuDB[p].subs.splice(s,1); render(); }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(menuDB, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "menugestion.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        render();
    </script>
</body>
</html>
